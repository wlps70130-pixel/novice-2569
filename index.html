<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>โครงการบรรพชาสามเณรภาคฤดูร้อน 2569</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}.container{max-width:800px;margin:0 auto;background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}.header{background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%);color:#fff;padding:40px 30px;text-align:center}.header h1{font-size:28px;margin-bottom:10px}.header p{opacity:.95;font-size:16px}.form-section{padding:30px}h2{color:#333;font-size:22px;margin-bottom:20px;padding-bottom:10px;border-bottom:3px solid #f5576c}.form-group{margin-bottom:20px}.form-group label{display:block;color:#555;font-weight:600;margin-bottom:8px}.form-group input,.form-group select{width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:8px;font-size:15px;transition:border .3s}.form-group input:focus,.form-group select:focus{outline:none;border-color:#f5576c}.form-row{display:grid;grid-template-columns:1fr 1fr;gap:15px}.btn{background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%);color:#fff;border:none;padding:16px;font-size:18px;font-weight:600;border-radius:12px;cursor:pointer;width:100%;margin-top:10px;transition:transform .2s,box-shadow .2s}.btn:hover{transform:translateY(-2px);box-shadow:0 10px 25px rgba(245,87,108,.4)}.btn:disabled{opacity:.6;cursor:not-allowed}#status{margin-top:15px;padding:15px;border-radius:8px;display:none}#status.success{background:#d4edda;color:#155724;display:block}#status.error{background:#f8d7da;color:#721c24;display:block}@media(max-width:768px){.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>โครงการบรรพชาสามเณร</h1>
<p>ภาคฤดูร้อน พุทธศักราช 2569</p>
</div>
<div class="form-section">
<form id="registrationForm">
<h2>📝 ข้อมูลส่วนตัว</h2>
<div class="form-row">
<div class="form-group">
<label>คำนำหน้า</label>
<select name="prefix" required>
<option>เด็กชาย</option>
<option>นาย</option>
</select>
</div>
<div class="form-group">
<label>ชื่อ</label>
<input name="firstName" required>
</div>
</div>
<div class="form-row">
<div class="form-group">
<label>นามสกุล</label>
<input name="lastName" required>
</div>
<div class="form-group">
<label>เลขบัตรประชาชน</label>
<input name="idCard" pattern="[0-9]{13}" maxlength="13" required>
</div>
</div>
<div class="form-row">
<div class="form-group">
<label>วันเกิด (วว/ดด/ปปปป)</label>
<input name="birthDate" placeholder="01/01/2555" required>
</div>
<div class="form-group">
<label>อายุ (ปี)</label>
<input name="age" type="number" min="9" max="17" required>
</div>
</div>
<div class="form-group">
<label>ที่อยู่ปัจจุบัน</label>
<input name="address" required>
</div>
<h2>🎓 การศึกษาและสุขภาพ</h2>
<div class="form-row">
<div class="form-group">
<label>โรงเรียน</label>
<input name="school" required>
</div>
<div class="form-group">
<label>ระดับชั้น</label>
<input name="grade" required>
</div>
</div>
<div class="form-row">
<div class="form-group">
<label>น้ำหนัก (กก.)</label>
<input name="weight" type="number" required>
</div>
<div class="form-group">
<label>ส่วนสูง (ซม.)</label>
<input name="height" type="number" required>
</div>
</div>
<div class="form-row">
<div class="form-group">
<label>หมู่เลือด</label>
<select name="bloodType" required>
<option value="">เลือก</option>
<option>A</option>
<option>B</option>
<option>O</option>
<option>AB</option>
</select>
</div>
<div class="form-group">
<label>โรคประจำตัว/ยาที่แพ้</label>
<input name="health" placeholder="ถ้าไม่มีเว้นว่าง">
</div>
</div>
<h2>👨‍👩‍👦 ข้อมูลผู้ปกครอง</h2>
<div class="form-row">
<div class="form-group">
<label>ชื่อผู้ปกครอง</label>
<input name="guardianName" required>
</div>
<div class="form-group">
<label>ความสัมพันธ์</label>
<select name="guardianRel" required>
<option>พ่อ</option>
<option>แม่</option>
<option>ปู่/ย่า</option>
<option>ตา/ยาย</option>
<option>ญาติ</option>
</select>
</div>
</div>
<div class="form-row">
<div class="form-group">
<label>เบอร์โทร</label>
<input name="guardianPhone" required>
</div>
<div class="form-group">
<label>LINE ID</label>
<input name="guardianLine">
</div>
</div>
<h2>📸 รูปถ่ายและเพิ่มเติม</h2>
<div class="form-group">
<label>อัปโหลดรูปถ่าย (ชุดสุภาพ)</label>
<input type="file" name="photo" accept="image/*" required>
</div>
<div class="form-group">
<label>ความประสงค์เรื่องเจ้าภาพ</label>
<select name="sponsorship" required>
<option value="">เลือก</option>
<option value="own">จะเป็นเจ้าภาพเอง (3,000 บาท)</option>
<option value="temple">ให้ทางวัดหาเจ้าภาพให้</option>
</select>
</div>
<div class="form-group">
<label>
<input type="checkbox" name="consent" required>
ข้าพเจ้ายืนยันว่าข้อมูลข้างต้นเป็นความจริง
</label>
</div>
<button type="submit" class="btn">ส่งใบสมัคร</button>
<div id="status"></div>
</form>
</div>
</div>
<script>
const form=document.getElementById('registrationForm');
const status=document.getElementById('status');
form.addEventListener('submit',async e=>{
e.preventDefault();
const btn=form.querySelector('.btn');
btn.disabled=true;
btn.textContent='กำลังส่ง...';
status.style.display='none';
try{
const fd=new FormData(form);
const data={
name:fd.get('prefix')+fd.get('firstName')+' '+fd.get('lastName'),
firstName:fd.get('firstName'),
lastName:fd.get('lastName'),
fullName:fd.get('prefix')+fd.get('firstName')+' '+fd.get('lastName'),
idCard:fd.get('idCard'),
birthDate:fd.get('birthDate'),
age:fd.get('age'),
bloodType:fd.get('bloodType'),
address:fd.get('address'),
school:fd.get('school'),
grade:fd.get('grade'),
weight:fd.get('weight'),
height:fd.get('height'),
robeSize:'',
health:fd.get('health'),
sponsorship:fd.get('sponsorship'),
guardianName:fd.get('guardianName'),
guardianRel:fd.get('guardianRel'),
guardianPhone:fd.get('guardianPhone'),
guardianLine:fd.get('guardianLine'),
appNo:fd.get('photo')?'มีรูป':'',
timestamp:new Date().toISOString()
};
const photo=fd.get('photo');
if(photo && photo.size>0){
const reader=new FileReader();
const base64=await new Promise(resolve=>{
reader.onload=()=>resolve(reader.result.split(',')[1]);
reader.readAsDataURL(photo);
});
data.photoBase64=base64;
data.photoName=photo.name;
}
const res=await fetch('https://novice-submit.wlps70130.workers.dev/submit',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({data})
});
const result=await res.json();
if(result.ok){
status.className='success';
status.textContent='✅ ส่งใบสมัครสำเร็จ! ทางวัดจะติดต่อกลับทาง LINE';
form.reset();
}else{
throw new Error(result.error||'เกิดข้อผิดพลาด');
}
}catch(err){
status.className='error';
status.textContent='❌ '+err.message;
}finally{
btn.disabled=false;
btn.textContent='ส่งใบสมัคร';
}
});
</script>
</body>
</html>
